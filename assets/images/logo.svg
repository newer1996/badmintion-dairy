<!-- App Logo SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07C160"/>
      <stop offset="100%" style="stop-color:#06AD56"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  <!-- Shuttlecock -->
  <ellipse cx="256" cy="140" rx="70" ry="40" fill="white"/>
  <path d="M186 140 L170 350 Q256 400 342 350 L326 140" fill="white" opacity="0.9"/>
  <!-- Racket -->
  <ellipse cx="256" cy="280" rx="120" ry="140" fill="none" stroke="white" stroke-width="12"/>
  <!-- Strings -->
  <line x1="256" y1="140" x2="256" y2="420" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="136" y1="280" x2="376" y2="280" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="160" y1="190" x2="352" y2="190" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="160" y1="370" x2="352" y2="370" stroke="white" stroke-width="3" opacity="0.6"/>
  <!-- Handle -->
  <rect x="226" y="420" width="60" height="70" fill="#2D2D2D" rx="10"/>
</svg>
